name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to publish, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          if ! command -v cmake >/dev/null 2>&1; then
            brew install cmake
          fi

      - name: Build release DMG
        run: make package-release SIGN_IDENTITY=-

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperOverlay-dmg
          path: dist/WhisperOverlay-release.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: dist/WhisperOverlay-release.dmg
          generate_release_notes: true
