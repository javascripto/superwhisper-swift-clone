name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to publish, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          if ! command -v cmake >/dev/null 2>&1; then
            brew install cmake
          fi

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          if [ -z "$DEVELOPER_ID_P12_BASE64" ] || [ -z "$DEVELOPER_ID_P12_PASSWORD" ]; then
            echo "Missing Developer ID certificate secrets."
            echo "Set DEVELOPER_ID_P12_BASE64 and DEVELOPER_ID_P12_PASSWORD."
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/whisperoverlay.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$KEYCHAIN_PASSWORD" > "$RUNNER_TEMP/keychain-password.txt"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"
          security import "$RUNNER_TEMP/developer-id.p12" -k "$KEYCHAIN_PATH" -P "$DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          SIGN_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          if [ -z "$SIGN_IDENTITY" ]; then
            echo "Could not find a Developer ID Application identity in the imported certificate."
            exit 1
          fi
          echo "SIGN_IDENTITY=$SIGN_IDENTITY" >> "$GITHUB_ENV"

      - name: Build notarized release DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_PASSWORD" ]; then
            echo "Missing Apple notarization secrets."
            echo "Set APPLE_ID, APPLE_TEAM_ID and APPLE_APP_PASSWORD."
            exit 1
          fi
          make package-release-notarized SIGN_IDENTITY="$SIGN_IDENTITY"

      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperOverlay-dmg
          path: dist/WhisperOverlay-release.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        if: env.RELEASE_TAG != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: dist/WhisperOverlay-release.dmg
          generate_release_notes: true
